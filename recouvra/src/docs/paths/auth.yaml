paths:
  /api/auth/connexion:
    post:
      tags: [Authentification]
      summary: Connexion utilisateur
      description: Authentifie un utilisateur et retourne un token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnexionInput'
      responses:
        200:
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: Connexion réussie }
                  token: { type: string, example: eyJhbGciOiJIUzI1NiJ9... }
                  role: { type: string, example: ADMIN }
        400:
          description: Email ou mot de passe incorrect
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        500:
          description: Erreur serveur
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/session:
    get:
      tags: [Authentification]
      summary: Vérifier la session
      description: Vérifie la validité du token JWT et retourne les informations de session.
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Session valide
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: Session valide }
                  utilisateur:
                    type: object
                    properties:
                      id: { type: string }
                      role: { type: string }
        401:
          description: Token manquant ou invalide
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
