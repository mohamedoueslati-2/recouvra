paths:
  /api/clients:
    get:
      tags: [Clients]
      summary: Récupérer tous les clients
      description: Requiert le rôle MANAGER ou AGENT.
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Liste des clients
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Client' }
        401: { description: Non authentifié }
        403: { description: Accès interdit }
    post:
      tags: [Clients]
      summary: Créer un client
      description: Requiert le rôle MANAGER ou AGENT.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientInput' }
      responses:
        201:
          description: Client créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  client: { $ref: '#/components/schemas/Client' }
        400: { description: Données invalides ou email déjà utilisé }
        401: { description: Non authentifié }
        403: { description: Accès interdit }

  /api/clients/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: ID MongoDB du client
    get:
      tags: [Clients]
      summary: Récupérer un client par ID
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Client trouvé
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }
        401: { description: Non authentifié }
        403: { description: Accès interdit }
        404: { description: Client non trouvé }
    put:
      tags: [Clients]
      summary: Mettre à jour un client
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientUpdate' }
      responses:
        200:
          description: Client mis à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  client: { $ref: '#/components/schemas/Client' }
        400: { description: Données invalides }
        401: { description: Non authentifié }
        403: { description: Accès interdit }
        404: { description: Client non trouvé }
    delete:
      tags: [Clients]
      summary: Supprimer un client
      security: [{ bearerAuth: [] }]
      responses:
        200: { description: Client supprimé }
        401: { description: Non authentifié }
        403: { description: Accès interdit }
        404: { description: Client non trouvé }
