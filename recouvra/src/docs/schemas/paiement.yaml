components:
  schemas:
    Paiement:
      type: object
      properties:
        id:
          type: string
          example: 64b1f2c3d4e5f6a7b8c9d0e4
        facture:
          type: string
          description: ID MongoDB de la facture
          example: 64b1f2c3d4e5f6a7b8c9d0e3
        montant:
          type: number
          example: 500.00
        datePaiement:
          type: string
          format: date-time
          example: "2024-01-20T10:30:00Z"
        reference:
          type: string
          example: VIR-2024-001
        methode:
          type: string
          enum: [VIREMENT, CHEQUE, ESPECES]
          example: VIREMENT
    PaiementInput:
      type: object
      required: [facture, montant, reference, methode]
      properties:
        facture:
          type: string
          description: ID MongoDB de la facture
          example: 64b1f2c3d4e5f6a7b8c9d0e3
        montant:
          type: number
          minimum: 0.01
          example: 500.00
        reference:
          type: string
          example: VIR-2024-001
        methode:
          type: string
          enum: [VIREMENT, CHEQUE, ESPECES]
          example: VIREMENT
