components:
  schemas:
    Utilisateur:
      type: object
      properties:
        id:
          type: string
          example: 64b1f2c3d4e5f6a7b8c9d0e1
        nom:
          type: string
          example: Alice Martin
        email:
          type: string
          format: email
          example: alice@recouvra.com
        role:
          type: string
          enum: [ADMIN, MANAGER, AGENT]
          example: AGENT
    UtilisateurInput:
      type: object
      required: [nom, email, motDePasse, role]
      properties:
        nom:
          type: string
          minLength: 3
          example: Alice Martin
        email:
          type: string
          format: email
          example: alice@recouvra.com
        motDePasse:
          type: string
          minLength: 6
          example: secret123
        role:
          type: string
          enum: [ADMIN, MANAGER, AGENT]
          example: AGENT
    UtilisateurUpdate:
      type: object
      properties:
        nom:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        motDePasse:
          type: string
          minLength: 6
        role:
          type: string
          enum: [ADMIN, MANAGER, AGENT]
